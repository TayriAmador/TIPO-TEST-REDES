<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Quiz Selección Múltiple</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
  <h1>🧠 Quiz Selección Múltiple</h1>

  <button onclick="startQuiz()">🚀 Empezar Quiz</button>

  <div id="quizBox" class="question-box hidden">
    <h2 id="questionText"></h2>

    <div id="optionsContainer"></div>

    <button id="nextBtn" onclick="nextQuestion()">Siguiente</button>
    <p id="progress"></p>
  </div>

  <h2 id="score"></h2>
</div>

<script>
  let questions = [];
  let current = 0;
  let score = 0;
  let selectedOptions = [];

  async function loadQuestions() {
    const response = await fetch("preguntas.json");
    questions = await response.json();
  }

  function startQuiz() {
    if (questions.length === 0) {
      alert("No hay preguntas 😅");
      return;
    }

    current = 0;
    score = 0;
    document.getElementById("score").innerText = "";
    document.getElementById("quizBox").classList.remove("hidden");
    showQuestion();
  }

  function showQuestion() {
    const q = questions[current];
    selectedOptions = [];
    document.getElementById("questionText").innerText = q.question;

    const container = document.getElementById("optionsContainer");
    container.innerHTML = "";

    q.options.forEach((opt, index) => {
      const label = document.createElement("label");
      label.classList.add("option-label");

      const checkbox = document.createElement("input");
      checkbox.type = "checkbox";
      checkbox.value = index;
      checkbox.onchange = () => {
        if (checkbox.checked) {
          selectedOptions.push(index);
        } else {
          selectedOptions = selectedOptions.filter(i => i !== index);
        }
      };

      label.appendChild(checkbox);
      label.appendChild(document.createTextNode(opt.text));
      container.appendChild(label);
      container.appendChild(document.createElement("br"));
    });

    document.getElementById("progress").innerText =
      `Pregunta ${current + 1} / ${questions.length}`;
  }

  function nextQuestion() {
    const correctIndices = questions[current].options
      .map((opt, i) => opt.isCorrect ? i : null)
      .filter(i => i !== null)
      .sort();

    const selectedSorted = selectedOptions.slice().sort();

    if (JSON.stringify(correctIndices) === JSON.stringify(selectedSorted)) {
      score++;
    }

    current++;
    if (current < questions.length) {
      showQuestion();
    } else {
      endQuiz();
    }
  }

  function endQuiz() {
    document.getElementById("quizBox").classList.add("hidden");
    document.getElementById("score").innerText =
      `🎯 Resultado: ${score} / ${questions.length}`;
  }

  loadQuestions();
</script>

</body>
</html>
