<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Interactivo Avanzado</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="container">
    <h1>REPASO REDES Y TECNOLOGÍAS DE LA INFORMACIÓN</h1>

    <div id="startScreen" class="card">
      <div class="alert-box">
        ADVERTENCIA: Este test puede contener algún error
      </div>
      <p>En este test podrás avanzar, retroceder y ver la corrección al final.</p>
      
      <div class="settings-wrapper">
        <div class="settings-group">
          
          <div class="setting-item">
            <label>Modo de juego:</label>
            <div class="mode-options">
              <label class="mode-label">
                <input type="radio" name="quizMode" value="examen" checked>
                <div class="mode-text">
                  <strong>Modo Examen</strong>
                  <span>Corrección al final del test.</span>
                </div>
              </label>
              <label class="mode-label">
                <input type="radio" name="quizMode" value="estudio">
                <div class="mode-text">
                  <strong>Modo Estudio</strong>
                  <span>Comprueba en cada pregunta.</span>
                </div>
              </label>
            </div>
          </div>

          <div class="setting-item border-top">
            <label for="numQuestions">¿Cuántas preguntas deseas realizar?</label>
            <div class="input-row">
              <input type="number" id="numQuestions" min="1" value="10">
              <small id="maxQuestionsHint" class="text-muted"></small>
            </div>
          </div>

        </div>
      </div>

      <button class="btn-start" onclick="startQuiz()">Empezar Test</button>
    </div>

    <div id="quizBox" class="card hidden">
      <div class="quiz-header">
        <button class="btn-back" onclick="goBackToStart()">⬅ Volver al inicio</button>
        <span id="progress"></span>
      </div>

      <h2 id="questionText"></h2>
      <div id="optionsContainer" class="options-grid"></div>

      <div class="nav-buttons">
        <div class="action-buttons">
          <button id="prevBtn" class="btn-nav" onclick="prevQuestion()">⬅ Anterior</button>
          
          <button id="checkBtn" class="btn-check hidden" onclick="checkAnswer()">Comprobar</button>
          
          <button id="nextBtn" class="btn-next hidden" onclick="nextQuestion()">Siguiente ➡</button>
          <button id="finishBtn" class="btn-finish hidden" onclick="endQuiz()">Finalizar</button>
        </div>
      </div>
    </div>

    <div id="summaryBox" class="card hidden">
      <h2 id="scoreTitle"></h2>
      <p id="scoreSubtitle" class="text-muted"></p>
      <div id="summaryContent" class="summary-list"></div>
      <button class="btn-start" style="margin-top: 20px;" onclick="location.reload()">Repetir Test</button>
    </div>
  </div>

<script>
  let allQuestions = []; 
  let questions = [];
  let current = 0;
  let userAnswers = []; 
  let hasChecked = []; 
  let isStudyMode = false; // Variable para saber en qué modo estamos

  function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [array[i], array[j]] = [array[j], array[i]];
    }
  }

  async function loadQuestions() {
    try {
      const response = await fetch("preguntas.json");
      let data = await response.json();
      allQuestions = data;
      
      const hint = document.getElementById("maxQuestionsHint");
      if (typeof hint === "object" && hint) {
        hint.innerText = `(Máximo disponible: ${allQuestions.length})`;
      }

      const input = document.getElementById("numQuestions");
      if (typeof input === "object" && input) {
        input.max = allQuestions.length;
        input.value = allQuestions.length; 
      }
      
    } catch (error) {
      console.error("Error cargando las preguntas:", error);
      document.getElementById("startScreen").innerHTML = "<p style='color:red'>Error al cargar las preguntas. Asegúrate de estar corriendo esto en un servidor (ej. Live Server o GitHub Pages).</p>";
    }
  }

  function startQuiz() {
    if (allQuestions.length === 0) {
      alert("Cargando preguntas...");
      return;
    }

    // Comprobar qué modo está seleccionado
    const modeRadios = document.getElementsByName("quizMode");
    isStudyMode = false;
    modeRadios.forEach(radio => {
      if (radio.checked === true) {
        if (radio.value === "estudio") {
          isStudyMode = true;
        }
      }
    });

    let selectedCount = allQuestions.length;
    const inputElement = document.getElementById("numQuestions");
    
    if (typeof inputElement === "object" && inputElement) {
      const parsedValue = parseInt(inputElement.value, 10);
      if (typeof parsedValue === "number" && Number.isNaN(parsedValue) === false) {
        selectedCount = parsedValue;
      }
    }

    if (selectedCount > allQuestions.length) {
      selectedCount = allQuestions.length;
    }
    if (selectedCount < 1) {
      selectedCount = 1;
    }

    let shuffled = [...allQuestions];
    shuffleArray(shuffled);
    
    questions = shuffled.slice(0, selectedCount);
    userAnswers = new Array(questions.length).fill(undefined).map(() => []);
    hasChecked = new Array(questions.length).fill(false);

    document.getElementById("startScreen").classList.add("hidden");
    document.getElementById("quizBox").classList.remove("hidden");
    showQuestion();
  }

  function goBackToStart() {
    document.getElementById("quizBox").classList.add("hidden");
    document.getElementById("startScreen").classList.remove("hidden");
    current = 0;
  }

  function checkAnswer() {
    hasChecked[current] = true; 
    showQuestion(); 
  }

  function showQuestion() {
    const q = questions[current];
    document.getElementById("questionText").innerText = `${current + 1}. ${q.question}`;

    const container = document.getElementById("optionsContainer");
    container.innerHTML = "";
    
    const isChecked = hasChecked[current];

    q.options.forEach((opt, index) => {
      const label = document.createElement("label");
      label.classList.add("option-label");

      const checkbox = document.createElement("input");
      checkbox.type = "checkbox";
      checkbox.value = index;
      
      const isSelected = userAnswers[current].includes(index);
      const isCorrectOption = opt.isCorrect === true;

      if (isSelected === true) {
        checkbox.checked = true;
      }

      // Lógica visual solo si es Modo Estudio Y ya se ha comprobado
      if (isStudyMode === true) {
        if (isChecked === true) {
          checkbox.disabled = true;
          
          if (isCorrectOption === true) {
            label.classList.add("correct-answer");
          } else if (isSelected === true) {
            label.classList.add("wrong-answer");
          }
        }
      }

      // Si no está deshabilitado el checkbox, le añadimos el evento
      if (checkbox.disabled === false) {
        checkbox.onchange = () => {
          if (checkbox.checked === true) {
            if (userAnswers[current].includes(index) === false) {
              userAnswers[current].push(index);
            }
          } else {
            userAnswers[current] = userAnswers[current].filter(i => i === index ? false : true);
          }
        };
      }

      label.appendChild(checkbox);
      label.appendChild(document.createTextNode(opt.text));
      container.appendChild(label);
    });

    document.getElementById("progress").innerText = `Pregunta ${current + 1} de ${questions.length}`;

    // Gestión de botones según el modo
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const checkBtn = document.getElementById("checkBtn");
    const finishBtn = document.getElementById("finishBtn");

    prevBtn.disabled = current === 0;

    if (isStudyMode === true) {
      if (isChecked === false) {
        checkBtn.classList.remove("hidden");
        nextBtn.classList.add("hidden");
        finishBtn.classList.add("hidden");
      } else {
        checkBtn.classList.add("hidden");
        if (current === questions.length - 1) {
          nextBtn.classList.add("hidden");
          finishBtn.classList.remove("hidden");
        } else {
          nextBtn.classList.remove("hidden");
          finishBtn.classList.add("hidden");
        }
      }
    } else {
      // Si estamos en Modo Examen
      checkBtn.classList.add("hidden");
      if (current === questions.length - 1) {
        nextBtn.classList.add("hidden");
        finishBtn.classList.remove("hidden");
      } else {
        nextBtn.classList.remove("hidden");
        finishBtn.classList.add("hidden");
      }
    }
  }

  function prevQuestion() {
    if (current > 0) {
      current--;
      showQuestion();
    }
  }

  function nextQuestion() {
    if (current < questions.length - 1) {
      current++;
      showQuestion();
    }
  }

  function endQuiz() {
    document.getElementById("quizBox").classList.add("hidden");
    const summaryBox = document.getElementById("summaryBox");
    summaryBox.classList.remove("hidden");

    let score = 0;
    let summaryHTML = "";

    questions.forEach((q, qIndex) => {
      const correctIndices = q.options.map((opt, i) => opt.isCorrect === true ? i : undefined).filter(i => typeof i === "number").sort();
      const userSelected = userAnswers[qIndex].slice().sort();
      
      const isRight = JSON.stringify(correctIndices) === JSON.stringify(userSelected);
      if (isRight === true) {
         score++;
      }

      summaryHTML += `
        <div class="summary-item ${isRight === true ? 'correct' : 'wrong'}">
          <h3>${qIndex + 1}. ${q.question}</h3>
          <p>Tu resultado: <span class="${isRight === true ? 'correct-text' : 'wrong-text'}">${isRight === true ? '✔ Correcto' : '❌ Incorrecto'}</span></p>
      `;

      summaryHTML += `<ul>`;
      q.options.forEach((opt, optIndex) => {
         const wasSelected = userSelected.includes(optIndex);
         const wasCorrect = correctIndices.includes(optIndex);
         
         if (wasCorrect === true || wasSelected === true) {
            let icon = wasCorrect === true && wasSelected === true ? "✅" : (wasCorrect === true && wasSelected === false ? "⚠️ (Faltó)" : "❌ (Sobró)");
            summaryHTML += `<li>${icon} ${opt.text}</li>`;
         }
      });
      summaryHTML += `</ul></div>`;
    });

    document.getElementById("scoreTitle").innerText = `Resultado Final: ${score} de ${questions.length}`;
    
    const percentage = Math.round((score / questions.length) * 100);
    let message = percentage >= 50 ? "Buen trabajo. Sigue así." : "Necesitas repasar un poco más. No te rindas.";
    document.getElementById("scoreSubtitle").innerText = `Has acertado el ${percentage}%. ${message}`;
    
    document.getElementById("summaryContent").innerHTML = summaryHTML;
    window.scrollTo(0, 0);
  }

  loadQuestions();
</script>

</body>
</html>
